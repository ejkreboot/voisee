  <circle cx="328" cy="308" r="1.5" fill="#A8D5BE" opacity="0.45"/>
  <ellipse cx="328" cy="308" rx="15" ry="6" fill="none" stroke="#A8D5BE" stroke-width="0.6" opacity="0.3" transform="rotate(-20 328 308)"/>
