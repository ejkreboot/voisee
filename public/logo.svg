<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#E8F7F0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#F5F0E8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Subtle background warmth -->
  <ellipse cx="200" cy="200" rx="180" ry="180" fill="url(#bg-glow)"/>

  <!-- Outer orbital ring -->
  <ellipse cx="200" cy="200" rx="148" ry="38" fill="none" stroke="#A8D5BE" stroke-width="1.2" opacity="0.55" transform="rotate(-12 200 200)"/>
  <circle cx="70" cy="177" r="4" fill="#A8D5BE" opacity="0.7" transform="rotate(-12 200 200)"/>
  <circle cx="330" cy="223" r="3" fill="#A8D5BE" opacity="0.5" transform="rotate(-12 200 200)"/>
  <circle cx="208" cy="161" r="2.5" fill="#C5E8D8" opacity="0.6" transform="rotate(-12 200 200)"/>

  <!-- Secondary inner orbital ring -->
  <ellipse cx="200" cy="200" rx="100" ry="26" fill="none" stroke="#D4B896" stroke-width="0.8" opacity="0.4" transform="rotate(8 200 200)"/>
  <circle cx="105" cy="205" r="3" fill="#D4B896" opacity="0.5" transform="rotate(8 200 200)"/>

  <!-- Device body -->
  <rect x="134" y="138" width="132" height="124" rx="18" fill="#F2EDE4" stroke="#C8BCA8" stroke-width="1.2"/>
