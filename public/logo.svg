  <circle cx="190" cy="243" r="3.5" fill="#D4B896" opacity="0.7"/>
  <circle cx="204" cy="243" r="3.5" fill="#8CC4AF" opacity="0.5"/>
  <circle cx="218" cy="243" r="3.5" fill="#E8C4A0" opacity="0.5"/>

