  <line x1="181" y1="250" x2="181" y2="262" stroke="#C8BCA8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="187" y1="251" x2="187" y2="261" stroke="#C8BCA8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="193" y1="251" x2="193" y2="261" stroke="#C8BCA8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="199" y1="250" x2="199" y2="262" stroke="#C8BCA8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="205" y1="250" x2="205" y2="262" stroke="#C8BCA8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="211" y1="251" x2="211" y2="261" stroke="#C8BCA8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="217" y1="251" x2="217" y2="261" stroke="#C8BCA8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="223" y1="252" x2="223" y2="260" stroke="#C8BCA8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="229" y1="253" x2="229" y2="259" stroke="#C8BCA8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="235" y1="254" x2="235" y2="258" stroke="#C8BCA8" stroke-width="1.5" stroke-linecap="round"/>

